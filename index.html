<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ADS — Avive EOR & Payroll Proposal</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --bg: #0D1B2A; --surface: #13243A; --surface2: #1A304D;
    --blue: #64B5F6; --blue2: #1E88E5; --teal: #26A69A;
    --cyan: #00BCD4; --orange: #FFA726; --text: #E3EDF7;
    --muted: #8FAAC8; --white: #FFFFFF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Calibri','Segoe UI',sans-serif; }
  a { color: var(--blue); text-decoration: none; }
  a:hover { text-decoration: underline; }

  nav { position: sticky; top: 0; z-index: 100; background: rgba(13,27,42,0.97); backdrop-filter: blur(8px); border-bottom: 2px solid var(--blue2); display: flex; align-items: center; gap: 6px; padding: 10px 20px; flex-wrap: wrap; }
  nav button { background: none; border: none; color: var(--muted); font-size: 13px; cursor: pointer; padding: 5px 10px; border-radius: 4px; transition: all .2s; white-space: nowrap; }
  nav button:hover, nav button.active { background: var(--blue2); color: #fff; }
  nav .logo { font-size: 18px; font-weight: 700; color: var(--blue); margin-right: 10px; flex-shrink: 0; }

  section { min-height: 100vh; padding: 60px 40px; max-width: 1100px; margin: 0 auto; }
  .section-title { font-size: 32px; font-weight: 700; color: #fff; margin-bottom: 8px; }
  .section-subtitle { font-size: 16px; color: var(--muted); margin-bottom: 36px; }

  #hero { display: flex; flex-direction: column; justify-content: center; min-height: 100vh; position: relative; }
  .hero-prepared { font-size: 13px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
  .hero-client { font-size: 26px; font-weight: 700; color: var(--blue); margin-bottom: 20px; }
  .hero-h1 { font-size: clamp(42px,7vw,80px); font-weight: 700; color: #fff; line-height: 1.05; }
  .hero-h2 { font-size: clamp(34px,5.5vw,64px); font-weight: 700; color: var(--blue2); margin-bottom: 18px; }
  .hero-tagline { font-size: 18px; font-style: italic; color: var(--muted); margin-bottom: 40px; }
  .hero-cta { background: var(--blue2); color: #fff; border: none; padding: 14px 32px; font-size: 16px; font-weight: 700; border-radius: 6px; cursor: pointer; width: fit-content; }
  .hero-cta:hover { background: #1565C0; }
  .hero-footer { position: absolute; bottom: 24px; font-size: 12px; color: var(--muted); }

  .stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 20px; margin-bottom: 32px; }
  .stat-card { background: var(--surface); border-radius: 10px; padding: 24px; text-align: center; border-top: 3px solid; transition: transform .2s; }
  .stat-card:hover { transform: translateY(-4px); }
  .stat-val { font-size: 42px; font-weight: 700; }
  .stat-label { font-size: 13px; color: var(--muted); margin-top: 8px; }
  .overview-desc { background: var(--surface); border-radius: 10px; padding: 24px; font-size: 15px; line-height: 1.7; margin-bottom: 24px; }
  .overview-btns { display: flex; gap: 16px; flex-wrap: wrap; }
  .btn-primary { background: var(--blue2); color: #fff; border: none; padding: 12px 28px; font-size: 15px; font-weight: 700; border-radius: 6px; cursor: pointer; }
  .btn-primary:hover { background: #1565C0; }
  .btn-teal { background: var(--teal); color: #fff; border: none; padding: 12px 28px; font-size: 15px; font-weight: 700; border-radius: 6px; cursor: pointer; }
  .btn-teal:hover { background: #1e7e75; }

  .services-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; }
  .service-card { background: var(--surface); border-radius: 10px; padding: 22px; border-left: 4px solid; transition: all .2s; }
  .service-card:hover { background: var(--surface2); transform: translateX(4px); }
  .service-card h3 { font-size: 15px; font-weight: 700; margin-bottom: 10px; }
  .service-card p { font-size: 13px; color: var(--text); line-height: 1.6; }

  .accordion { background: var(--surface); border-radius: 10px; margin-bottom: 8px; overflow: hidden; }
  .accordion-header { padding: 16px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 15px; font-weight: 700; color: #fff; user-select: none; transition: background .2s; }
  .accordion-header:hover { background: var(--surface2); }
  .accordion-body { padding: 0 20px 16px; font-size: 14px; color: var(--text); line-height: 1.7; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 700; margin: 2px; }
  .badge-blue { background: rgba(100,181,246,0.2); color: var(--blue); }
  .badge-teal { background: rgba(38,166,154,0.2); color: var(--teal); }
  .badge-cyan { background: rgba(0,188,212,0.2); color: var(--cyan); }

  .va-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; }
  .va-col { background: var(--surface); border-radius: 10px; overflow: hidden; }
  .va-col-header { padding: 16px 20px; font-size: 15px; font-weight: 700; color: #fff; }
  .va-col-body { padding: 16px 20px; }
  .va-item { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 13px; color: var(--text); line-height: 1.5; }
  .va-item:last-child { border-bottom: none; }

  .resp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .resp-col { background: var(--surface); border-radius: 10px; overflow: hidden; }
  .resp-col-header { padding: 14px 20px; font-size: 16px; font-weight: 700; color: #fff; }
  .resp-col-body { padding: 16px 20px; }
  .resp-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; font-size: 14px; color: var(--text); border-bottom: 1px solid rgba(255,255,255,0.06); }
  .resp-item:last-child { border-bottom: none; }
  .resp-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
  .resp-note { background: rgba(255,167,38,0.1); border: 1px solid var(--orange); border-radius: 8px; padding: 14px 18px; margin-top: 20px; font-size: 13px; color: var(--orange); font-style: italic; line-height: 1.6; }

  .price-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; margin-bottom: 28px; }
  .price-card { background: var(--surface); border-radius: 12px; padding: 28px 20px; text-align: center; border-top: 4px solid; transition: transform .2s, box-shadow .2s; }
  .price-card:hover { transform: translateY(-6px); box-shadow: 0 12px 32px rgba(0,0,0,0.4); }
  .price-tier { font-size: 14px; font-weight: 700; margin-bottom: 12px; }
  .price-amount { font-size: 56px; font-weight: 700; color: #fff; line-height: 1; }
  .price-unit { font-size: 13px; font-style: italic; color: var(--muted); margin-top: 8px; }
  .price-sample { background: rgba(255,167,38,0.08); border: 1px solid rgba(255,167,38,0.3); border-radius: 10px; padding: 18px 22px; margin-bottom: 20px; }
  .price-sample-title { font-size: 14px; font-weight: 700; color: var(--orange); margin-bottom: 8px; }
  .price-sample-total { font-size: 20px; font-weight: 700; color: #fff; }
  .price-note { font-size: 13px; color: var(--muted); line-height: 1.7; margin-bottom: 24px; background: var(--surface); border-radius: 10px; padding: 16px 20px; }
  .price-note-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
  .price-note-row:last-child { margin-bottom: 0; }
  .price-note-dot { color: var(--orange); font-size: 16px; flex-shrink: 0; margin-top: 1px; }

  .calc-box { background: var(--surface); border-radius: 12px; padding: 28px; }
  .calc-box h3 { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 16px; }
  .calc-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
  .calc-row label { font-size: 14px; color: var(--muted); min-width: 200px; }
  .calc-row input { background: var(--surface2); border: 1px solid rgba(255,255,255,0.15); border-radius: 6px; color: #fff; padding: 8px 12px; font-size: 15px; width: 80px; outline: none; }
  .calc-row input:focus { border-color: var(--blue2); }
  .calc-expenses { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
  .calc-expenses label { font-size: 14px; color: var(--muted); min-width: 200px; }
  .calc-expenses input { background: var(--surface2); border: 1px solid rgba(255,255,255,0.15); border-radius: 6px; color: #fff; padding: 8px 12px; font-size: 15px; width: 120px; outline: none; }
  .calc-expenses input:focus { border-color: var(--orange); }
  .calc-divider { border: none; border-top: 1px solid rgba(255,255,255,0.08); margin: 16px 0; }
  .calc-result { font-size: 22px; font-weight: 700; color: var(--teal); margin-top: 12px; }
  .calc-breakdown { font-size: 13px; color: var(--muted); margin-top: 6px; line-height: 1.7; }
  .calc-tag { display: inline-block; background: rgba(255,167,38,0.15); color: var(--orange); border-radius: 4px; padding: 1px 7px; font-size: 12px; font-weight: 700; margin-left: 6px; }

  .office-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .office-card { background: var(--surface); border-radius: 12px; overflow: hidden; }
  .office-header { padding: 16px 22px; }
  .office-title { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 4px; }
  .office-rec { font-size: 12px; font-style: italic; }
  .office-body { padding: 16px 22px; }
  .office-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; font-size: 14px; color: var(--text); border-bottom: 1px solid rgba(255,255,255,0.06); }
  .office-item:last-child { border-bottom: none; }
  .check { color: var(--teal); font-size: 16px; flex-shrink: 0; }
  .office-policy { background: rgba(255,167,38,0.08); border: 1px solid rgba(255,167,38,0.25); border-radius: 10px; padding: 16px 20px; margin-top: 24px; }
  .office-policy-title { font-size: 14px; font-weight: 700; color: var(--orange); margin-bottom: 10px; }
  .office-policy-item { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; color: var(--text); margin-bottom: 6px; line-height: 1.6; }
  .office-policy-item:last-child { margin-bottom: 0; }

  .why-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 32px; }
  .why-card { background: var(--surface); border-radius: 10px; padding: 22px; border-left: 4px solid; transition: all .2s; }
  .why-card:hover { background: var(--surface2); }
  .why-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
  .why-desc { font-size: 14px; color: var(--muted); line-height: 1.6; }
  .steps-section { background: var(--surface); border-radius: 12px; padding: 28px; }
  .steps-title { font-size: 20px; font-weight: 700; color: var(--blue2); margin-bottom: 20px; }
  .step-row { display: flex; align-items: center; gap: 16px; padding: 12px 16px; background: var(--surface2); border-radius: 8px; margin-bottom: 10px; }
  .step-num { width: 36px; height: 36px; border-radius: 50%; background: var(--blue2); color: #fff; font-size: 15px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .step-text { font-size: 14px; color: var(--text); }

  #contact { display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
  .contact-title { font-size: clamp(28px,5vw,52px); font-weight: 700; color: #fff; margin-bottom: 12px; }
  .contact-tagline { font-size: 18px; font-style: italic; color: var(--blue); margin-bottom: 40px; }
  .contact-links { display: flex; flex-direction: column; gap: 14px; align-items: center; margin-bottom: 32px; }
  .contact-link { display: flex; align-items: center; gap: 12px; font-size: 16px; color: #fff; }
  .contact-conf { font-size: 12px; color: var(--muted); font-style: italic; margin-top: 24px; }

  @media (max-width: 768px) {
    section { padding: 40px 20px; }
    .stats-grid, .services-grid, .va-grid, .price-grid, .office-grid, .why-grid, .resp-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

function Nav({ active, setActive }) {
  const sections = [
    ['hero','Home'],['about','About ADS'],['services','Core EOR'],
    ['payroll','Payroll'],['value','Value-Added'],['responsibility','Responsibility'],
    ['pricing','Pricing'],['office','Office'],['why','Why ADS'],['contact','Contact']
  ];
  return (
    <nav>
      <span className="logo">ADS</span>
      {sections.map(([id,label]) => (
        <button key={id} className={active===id?'active':''}
          onClick={()=>{document.getElementById(id)?.scrollIntoView({behavior:'smooth'});setActive(id);}}>
          {label}
        </button>
      ))}
    </nav>
  );
}

function Hero() {
  return (
    <section id="hero">
      <p className="hero-prepared">Prepared For</p>
      <p className="hero-client">Avive.life</p>
      <h1 className="hero-h1">Employer of Record</h1>
      <h2 className="hero-h2">&amp; Payroll Solutions</h2>
      <p className="hero-tagline">Scale your India team fast — zero entity setup required</p>
      <button className="hero-cta" onClick={()=>document.getElementById('about')?.scrollIntoView({behavior:'smooth'})}>
        Explore the Proposal →
      </button>
      <p className="hero-footer">AllDomainSoft.com Pvt Ltd · Confidential · 2025</p>
    </section>
  );
}

function About() {
  const stats = [
    {val:'50+',label:'Employees Managed',color:'#1E88E5'},
    {val:'100%',label:'India Labor Law Compliance',color:'#26A69A'},
    {val:'100%',label:'Payroll Accuracy',color:'#00BCD4'},
    {val:'13+',label:'Years India Expertise',color:'#FFA726'},
  ];
  return (
    <section id="about">
      <p className="section-title">Who Is AllDomainSoft (ADS)?</p>
      <p className="section-subtitle">Your India operations backbone</p>
      <div className="stats-grid">
        {stats.map((s,i)=>(
          <div key={i} className="stat-card" style={{borderTopColor:s.color}}>
            <div className="stat-val" style={{color:s.color}}>{s.val}</div>
            <div className="stat-label">{s.label}</div>
          </div>
        ))}
      </div>
      <div className="overview-desc">
        <strong style={{color:'#fff'}}>ADS is your India operations backbone. </strong>
        We handle hiring, payroll, compliance, and employee management — so Avive can scale its India team without setting up a legal entity.
      </div>
      <p style={{fontStyle:'italic',color:'#64B5F6',fontSize:'16px',margin:'0 0 24px'}}>
        "Your team grows. We handle the complexity. You stay focused on saving lives."
      </p>
      <div className="overview-btns">
        <button className="btn-primary" onClick={()=>document.getElementById('services')?.scrollIntoView({behavior:'smooth'})}>ADS Handles →</button>
        <button className="btn-teal" onClick={()=>document.getElementById('responsibility')?.scrollIntoView({behavior:'smooth'})}>Avive Focuses On →</button>
      </div>
    </section>
  );
}

function Services() {
  const services = [
    {title:'Employment Contracts',desc:"ADS acts as the legal employer. We issue fully compliant India employment agreements on Avive's behalf.",color:'#1E88E5'},
    {title:'Labor Law Compliance',desc:"End-to-end adherence to India's evolving labor codes — Shops & Establishment, POSH, CLRA and more.",color:'#26A69A'},
    {title:'Payroll Management',desc:'TDS Form 16A/B, PF, bonuses, reimbursements — all automated. Employees receive transparent INR salary every cycle.',color:'#00BCD4'},
    {title:'Benefits Administration',desc:'Health insurance (self/company), statutory leaves, occasional outings, and custom perks managed and documented.',color:'#64B5F6'},
    {title:'Background Verification',desc:'Thorough pre-employment BGV — education, employment history, criminal checks — before onboarding.',color:'#FFA726'},
    {title:'Termination & Risk',desc:'Legally sound offboarding, full-and-final settlements, and risk/liability absorption by ADS.',color:'#EF5350'},
  ];
  return (
    <section id="services">
      <p className="section-title">Core EOR Services</p>
      <p className="section-subtitle">What ADS Handles for Avive</p>
      <div className="services-grid">
        {services.map((s,i)=>(
          <div key={i} className="service-card" style={{borderLeftColor:s.color}}>
            <h3 style={{color:s.color}}>{s.title}</h3>
            <p>{s.desc}</p>
          </div>
        ))}
      </div>
    </section>
  );
}

function Accordion({title,desc,badges}) {
  const [open,setOpen]=useState(false);
  return (
    <div className="accordion">
      <div className="accordion-header" onClick={()=>setOpen(!open)}>
        <span>{title}</span>
        <span style={{transition:'transform .2s',display:'inline-block',transform:open?'rotate(180deg)':'none'}}>▾</span>
      </div>
      {open&&(
        <div className="accordion-body">
          <p style={{marginBottom:10}}>{desc}</p>
          {badges.map((b,i)=><span key={i} className={`badge badge-${b.color}`}>{b.label}</span>)}
        </div>
      )}
    </div>
  );
}

function Payroll() {
  const rows = [
    {title:'Transparent Salary in INR',desc:'On-time, accurate disbursement visible to every employee. No hidden deductions.',badges:[{label:'India Compliant',color:'blue'},{label:'Automated ✓',color:'teal'},{label:'Tax Filed ✓',color:'cyan'}]},
    {title:'TDS Deduction + Form 16A & 16B',desc:'Full income-tax withholding and end-of-year Form 16 issuance for all employees.',badges:[{label:'India Compliant',color:'blue'},{label:'Automated ✓',color:'teal'},{label:'Tax Filed ✓',color:'cyan'}]},
    {title:'Provident Fund (PF) Management',desc:'Employer & employee PF deducted and remitted per EPFO norms every month.',badges:[{label:'India Compliant',color:'blue'},{label:'Automated ✓',color:'teal'},{label:'Tax Filed ✓',color:'cyan'}]},
    {title:'Bonus Processing',desc:'Statutory and performance bonuses calculated, approved, and disbursed correctly.',badges:[{label:'India Compliant',color:'blue'},{label:'Automated ✓',color:'teal'},{label:'Tax Filed ✓',color:'cyan'}]},
    {title:'Automated Salary Disbursement',desc:'Zero manual payroll runs — system-driven with audit trails for every transaction.',badges:[{label:'India Compliant',color:'blue'},{label:'Automated ✓',color:'teal'},{label:'Tax Filed ✓',color:'cyan'}]},
    {title:'Expense & Reimbursement Claims',desc:'Allocated expense categories and employee reimbursement portal managed by ADS.',badges:[{label:'India Compliant',color:'blue'},{label:'Automated ✓',color:'teal'},{label:'Tax Filed ✓',color:'cyan'}]},
  ];
  return (
    <section id="payroll">
      <p className="section-title">Payroll Management</p>
      <p className="section-subtitle">Full Stack, Fully Automated — click each item to expand</p>
      {rows.map((r,i)=><Accordion key={i} {...r}/>)}
    </section>
  );
}

function ValueAdded() {
  const cols = [
    {header:'🔍 Talent Sourcing',color:'#1E88E5',items:[
      {bold:'Naukri.com',rest:' — 75M+ profiles (paid subscription)'},
      {bold:'LinkedIn',rest:' job postings'},
      {bold:'Hirist.com',rest:' — tech-focused job board'},
      {bold:'Pre-screening:',rest:' experience, location, availability'},
      {bold:'Only eligible candidates',rest:' passed to Avive team'},
    ]},
    {header:'🏢 Office Setup',color:'#26A69A',items:[
      {bold:'One-time search:',rest:' quotes from multiple Gurugram locations'},
      {bold:'Dedicated office',rest:' (recommended if: 5+ employees)'},
      {bold:'Co-working',rest:' private space (< 5 employees)'},
      {bold:'Includes:',rest:' rent, utilities, cleaner, stationery'},
      {bold:'Refreshments:',rest:' tea, coffee and essentials managed'},
    ]},
    {header:'💻 Laptop & Mobility',color:'#00BCD4',items:[
      {bold:'Asset management:',rest:' procurement & tracking'},
      {bold:'Collection on termination,',rest:' re-deployed to next hire'},
      {bold:'Mac EOL ~4 yrs',rest:' | Windows ~3 yrs lifecycle'},
      {bold:'Cab drops (night shift)',rest:' — one-way mandatory'},
      {bold:'Reimbursement:',rest:' parking/fuel if cab not taken'},
    ]},
  ];
  return (
    <section id="value">
      <p className="section-title">Beyond EOR</p>
      <p className="section-subtitle">Value-Added Services</p>
      <div className="va-grid">
        {cols.map((col,ci)=>(
          <div key={ci} className="va-col">
            <div className="va-col-header" style={{background:col.color+'22',borderBottom:`3px solid ${col.color}`}}>{col.header}</div>
            <div className="va-col-body">
              {col.items.map((item,ii)=>(
                <div key={ii} className="va-item"><strong>{item.bold}</strong>{item.rest}</div>
              ))}
            </div>
          </div>
        ))}
      </div>
    </section>

}

function Responsibility() {
  const ads=['Legal employer of record (contracts & liability)','Payroll, TDS, PF, bonuses & reimbursements','India labor law & statutory compliance','Employee benefits (insurance, leave, gratuity)','Background verification','Termination & full-and-final settlements','Office search, setup & management','Laptop lifecycle & cab/mobility services','Talent sourcing & pre-screening'];
  const avive=['Day-to-day work direction & management','Performance reviews & deliverables','Product roadmap & engineering decisions','Laptop procurement (by role/profile)','Mission: saving lives with AED technology'];
  return (
    <section id="responsibility">
      <p className="section-title">Clear Division of Responsibility</p>
      <p className="section-subtitle">Who does what — zero ambiguity</p>
      <div className="resp-grid">
        <div className="resp-col" style={{border:'1px solid rgba(100,181,246,0.3)'}}>
          <div className="resp-col-header" style={{background:'rgba(30,136,229,0.15)'}}>🏢 ADS Handles</div>
          <div className="resp-col-body">
            {ads.map((item,i)=>(
              <div key={i} className="resp-item">
                <div className="resp-dot" style={{background:'#1E88E5'}}/>
                {item}
              </div>
            ))}
          </div>
        </div>
        <div className="resp-col" style={{border:'1px solid rgba(38,166,154,0.3)'}}>
          <div className="resp-col-header" style={{background:'rgba(38,166,154,0.15)'}}>🚀 Avive Focuses On</div>
          <div className="resp-col-body">
            {avive.map((item,i)=>(
              <div key={i} className="resp-item">
                <div className="resp-dot" style={{background:'#26A69A'}}/>
                {item}
              </div>
            ))}
          </div>
        </div>
      </div>
      <div className="resp-note">✦ Avive gets full control over its team's work — ADS absorbs all India employer risk, compliance, and administration.</div>
    </section>
  );
}

function PricingCalc() {
  const [n1,setN1]=useState(2);
  const [n2,setN2]=useState(3);
  const [n3,setN3]=useState(5);
  const [expenses,setExpenses]=useState(0);
  const t1=Math.max(0,parseInt(n1)||0);
  const t2=Math.max(0,parseInt(n2)||0);
  const t3=Math.max(0,parseInt(n3)||0);
  const exp=Math.max(0,parseFloat(expenses)||0);
  const eorFee=t1*225+t2*200+t3*175;
  const expFee=Math.round(exp*1.05*100)/100;
  const total=Math.round((eorFee+expFee)*100)/100;
  return (
    <div className="calc-box">
      <h3>💡 Interactive Price Calculator</h3>
      <div className="calc-row">
        <label>Tier 1 — 1–5 employees @ $225</label>
        <input type="number" min="0" value={n1} onChange={e=>setN1(e.target.value)}/>
      </div>
      <div className="calc-row">
        <label>Tier 2 — 6–10 employees @ $200</label>
        <input type="number" min="0" value={n2} onChange={e=>setN2(e.target.value)}/>
      </div>
      <div className="calc-row">
        <label>Tier 3 — 11+ employees @ $175</label>
        <input type="number" min="0" value={n3} onChange={e=>setN3(e.target.value)}/>
      </div>
      <hr className="calc-divider"/>
      <div className="calc-expenses">
        <label>Pass-through expenses (USD) <span className="calc-tag">+5%</span></label>
        <input type="number" min="0" step="10" value={expenses} onChange={e=>setExpenses(e.target.value)} style={{borderColor:'rgba(255,167,38,0.5)'}}/>
      </div>
      <p style={{fontSize:12,color:'var(--muted)',marginBottom:12,marginLeft:2}}>
        Covers: office rent, laptops, keyboards, hardware, office supplies, utilities — invoiced at actual INR cost converted to USD, +5% added
      </p>
      <div className="calc-result">Total Monthly: ${total.toLocaleString()}</div>
      <div className="calc-breakdown">
        EOR Fee: ({t1}×$225) + ({t2}×$200) + ({t3}×$175) = <strong style={{color:'#fff'}}>${eorFee.toLocaleString()}</strong><br/>
        {exp > 0 && <>Pass-through: ${exp.toLocaleString()} × 1.05 = <strong style={{color:'#fff'}}>${expFee.toLocaleString()}</strong><br/></>}
        <strong style={{color:'var(--teal)'}}>Grand Total: ${total.toLocaleString()} / month</strong>
      </div>
    </div>
  );
}

function App() {
  const [active,setActive]=useState('hero');
  useEffect(()=>{
    const ids=['hero','about','services','payroll','value','responsibility','pricing','office','why','contact'];
    const obs=new IntersectionObserver(entries=>{
      entries.forEach(e=>{if(e.isIntersecting)setActive(e.target.id);});
    },{threshold:0.3});
    ids.forEach(id=>{const el=document.getElementById(id);if(el)obs.observe(el);});
    return()=>obs.disconnect();
  },[]);
  return (
    <>
      <Nav active={active} setActive={setActive}/>
      <Hero/><About/><Services/><Payroll/><ValueAdded/>
      <Responsibility/><Pricing/><Office/><Why/><Contact/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
